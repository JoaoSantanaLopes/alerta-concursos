notificacao:
  canal: telegram  # telegram | email

  email:
    smtp_host: smtp.gmail.com
    smtp_port: 587

banco:
  tipo: sqlite              # sqlite | postgres
  caminho: output/notificados.db   # usado só quando tipo=sqlite

analise_ia:
  habilitado: false
  tipo: gemini                      # gemini | ollama

  # Modelo escolhido.
  # Para gemini: gemini-2.5-flash, gemini-2.5-pro, etc.
  # Para ollama: gemma3, llama3.1, qwen2.5, etc. (precisa estar puxado via `ollama pull`)
  modelo: gemini-2.5-flash

  # Usados apenas quando tipo=ollama
  host: http://localhost:11434
  max_chars_edital: 50000

  # Prompt enviado ao modelo junto com o edital.
  # IMPORTANTE:
  # - NÃO peça markdown na resposta (a notificação envia como texto puro)
  # - Mantenha o limite de ~500 palavras (mensagens longas são truncadas)
  prompt: |
    Analise este edital de concurso público e extraia APENAS informações
    sobre cargos da área de Tecnologia da Informação.

    Responda no formato abaixo, sem formatação markdown, sem negrito, sem asteriscos:

    Cargo: (nome)
    Vagas: (imediatas + cadastro reserva)
    Salário: (valor)
    Requisitos: (formação e experiência em uma linha)
    Data da prova: (data ou "não informada")
    Regime: (CLT/estatutário/temporário)
    Carga horária: (horas semanais)
    Conteúdo da prova: (listar os principais temas em uma linha, separados por vírgula)

    Se não houver cargos de TI, responda apenas: "Sem cargos de TI neste edital."

    Seja breve. Máximo 500 palavras.